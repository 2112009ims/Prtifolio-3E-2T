<!DOCTYPE html> <!--o DocType indica a linguagem de Programação que está sendo usado-->
<html lang="pt-br"> <!--inicio do codigo-->
<head> <!-- inicio do cabeçalho do documento. Dentro dessa  teg pode ser inseridas folhas de estilo e scipts-->
    <meta charset="UTF-8"> <!--indica qual sera os caracteres (character set ou charset) sera ultilizado para renderizar o texto da pagina.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifolio</title> <!-- titulo do projeto--> 
</head> <!-- fim do cabeçalho do documento-->
<body> <!-- nesse espaço esta conyido o conteudo visual da pagina. As tags que representam texto, botões e outros que devem ser adicionadas nesse intervalo.-->
    <!--um documento HTML é composto por tags que sao escritas entre < >. As tags precisam ser abertas e fechadas, o que as diferenciam é que as tags de fechamento possuem uma \ antes do nome. Alguns códigos não precisam da <\> para fechamento, apenas da barra, como o caso da tag meta. Outro aspecto importante da linguagem é que ela é case insensitive, ou seja, nao leva em consideraçao a diferença entra letras oficiais e minusculas.--> 
<!--No HTML há seis niveis de cabeçalhos/titulos que podem ser usados por meio das tags h1, h2, h3, h4,h5 e h6, sendo o h1 o maior e mais relevante e o h6 o menor/menos relevante. -->
<h1> Portifolio</h1>
<h2> Programaçao</h2>
<h3> HTML</h3>
<h4> CSS</h4>
<h5> JS</h5>
<h6> Matematica</h6>
<!-- Paragrafos de texto sao gerados em HTML por meio das tags <P> <
</body> <!--fechamento da tag-->
</html> <!-- fim do codigo-->
